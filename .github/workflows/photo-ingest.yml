name: Ingest New Photos

on:
  push:
    branches:
      - main
    paths:
      - "assets/images/**"
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch: # Manual trigger from GitHub UI or `gh workflow run photo-ingest.yml`

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run photo ingest script
        id: ingest
        run: |
          if node scripts/ingest-photos.js; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push new photos
        if: steps.ingest.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/ src/lib/images.ts
          COUNT=$(git diff --cached --name-only -- public/images/ | wc -l | tr -d ' ')
          git commit -m "chore: ingest ${COUNT} new photo(s)"
          git push
